<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circular Metronome</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: #fff;
    color: #000;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .circle {
    width: min(85vw, 85vh);
    height: min(85vw, 85vh);
    border: 2px solid #000;
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  .hand {
    position: absolute;
    width: 2px;
    height: 50%;
    background: #000;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
  }

  .center {
    position: absolute;
    width: 1.5%;
    height: 1.5%;
    background: #000;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .marker {
    position: absolute;
    width: 0.6%;
    height: 5%;
    background: #000;
    top: 50%;
    left: 50%;
    transform-origin: center center;
  }

  .controls {
    margin-top: 2vh;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    justify-content: center;
    font-size: clamp(12px, 2vmin, 18px);
  }

  button, input {
    background: #fff;
    color: #000;
    border: 1px solid #000;
    padding: 0.4em 0.8em;
    font-size: inherit;
  }

  input[type="number"] {
    width: 5em;
  }
</style>
<base target="_blank">
</head>
<body>

<div class="circle" id="circle">
  <div class="hand" id="hand"></div>
  <div class="center"></div>
</div>

<div class="controls">
  <button onclick="toggle()">Start / Stop</button>
  <label>
    BPM:
    <input type="number" id="bpmInput" value="120" min="1" max="99999">
  </label>
  <label>
    Beats per measure:
    <input type="number" id="beatsInput" value="4" min="1" max="60" onchange="drawMarkers()">
  </label>
  <label>
    Accent:
    <input type="checkbox" id="accentToggle" checked>
  </label>
</div>

<script>
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let isRunning = false;
let beatIndex = 0;
let lastBeatIndex = -1;
let lastTime = 0;

const hand = document.getElementById("hand");
const circle = document.getElementById("circle");

function getRadius() {
  return circle.offsetWidth / 2;
}

// sound
function clickSound(freq = 1000, duration = 0.02) {
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

// markers
function drawMarkers() {
  document.querySelectorAll(".marker").forEach(m => m.remove());

  const beats = parseInt(document.getElementById("beatsInput").value);
  const radius = getRadius();

  for (let i = 0; i < beats; i++) {
    let m = document.createElement("div");
    m.className = "marker";

    let angle = (360 / beats) * i;

    // Position marker at edge of circle
    let offset = radius - (radius * 0.06); // 6% inset from edge

    m.style.transform = `
      translate(-50%, -50%)
      rotate(${angle}deg)
      translateY(-${offset}px)
    `;

    if (i === 0) m.style.height = "7%";

    circle.appendChild(m);
  }
}

drawMarkers();
window.addEventListener("resize", drawMarkers);

function animate(time) {
  if (!isRunning) return;

  if (lastTime === 0) lastTime = time;
  let delta = time - lastTime;
  lastTime = time;

  let bpm = Math.max(1, parseInt(document.getElementById("bpmInput").value));
  let beats = Math.max(1, parseInt(document.getElementById("beatsInput").value));

  beatIndex += delta * bpm / 60000;

  let rotation = (beatIndex * 360 / beats) % 360;
  hand.style.transform = `translate(-50%, -100%) rotate(${rotation}deg)`;

  let currentBeat = Math.floor(beatIndex);
  if (currentBeat !== lastBeatIndex) {
    lastBeatIndex = currentBeat;

    let accentOn = document.getElementById("accentToggle").checked;
    let beatInMeasure = currentBeat % beats;

    if (accentOn && beatInMeasure === 0) {
      clickSound(600, 0.08);
    } else {
      clickSound(1000, 0.02);
    }
  }

  requestAnimationFrame(animate);
}

function toggle() {
  if (!audioCtx) audioCtx = new AudioContext();

  isRunning = !isRunning;

  if (isRunning) {
    beatIndex = 0;
    lastBeatIndex = -1;
    lastTime = 0;
    requestAnimationFrame(animate);
  }
}
</script>

</body>
</html>
