<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Circular Metronome</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
  background: #fff;
  color: #000;
  font-family: sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  width: 100vw;
  min-height: 100vh;
  overflow-x: hidden;
}

.global-bar {
  margin-bottom: 2rem;
  display: flex;
  flex-direction: column;   /* stack vertically */
  gap: 0.75rem;
  align-items: center;
  width: 100%;
  max-width: 600px;
}

.global-bar label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  gap: 0.5rem;
}

  .global-bar input[type="range"] {
    width: clamp(12rem, 20vw, 20rem);
  }

  .circle {
    width: min(60vw, 60vh);
    height: min(60vw, 60vh);
    border: 2px solid #000;
    border-radius: 50%;
    position: relative;
    flex-shrink: 0;
  }

  .hand {
    position: absolute;
    width: 2px;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: bottom center;
    transform: translate(-50%, -100%) rotate(0deg);
    z-index: 2;
  }

  .center {
    position: absolute;
    width: 1.5%;
    height: 1.5%;
    background: #000;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
  }

  .marker {
    position: absolute;
    width: 0.7%;
    height: 4.5%;
    top: 50%;
    left: 50%;
    transform-origin: center center;
    z-index: 1;
  }

  .controls {
  margin-top: 2vh;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-size: clamp(9px, 1.5vmin, 14px);
}

  .line-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    align-items: center;
    justify-content: center;
    padding: 0.3rem;
    width: 98%;
    max-width: 1100px;
  }

  .line-color {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 1px solid #000;
    flex-shrink: 0;
  }

  .accents-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 0.15rem;
    align-items: center;
    justify-content: center;
  }

  .accents-wrap label {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    font-size: 0.85em;
    cursor: pointer;
  }

  button, input, select {
    background: #fff;
    color: #000;
    border: 1px solid #000;
    padding: 0.2em 0.4em;
    font-size: inherit;
    font-family: inherit;
    cursor: pointer;
    user-select: none;
  }

  input[type="number"] {
    width: 4.6em;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .line-row input[type="range"] {
    width: 5em;
    vertical-align: middle;
  }

  .vol-label, .scale-label, .sus-label {
    font-size: 0.85em;
    min-width: 3.2em;
    text-align: center;
  }

  .global-btn,
  .add-btn {
    padding: 0.5em 1.2em;
    font-weight: bold;
    font-size: clamp(12px, 2vmin, 18px);
  }

  /* Make sure the body allows scrolling */
  html, body {
    overflow-x: hidden; /* Prevent horizontal scrolling */
  }
</style>
</head>
<body>

<div class="global-bar">
  <button class="global-btn" onclick="toggleAll()" id="globalBtn">Start</button>
  <button class="global-btn" onclick="resetAll()" id="resetBtn">Reset</button>
  <button class="add-btn" onclick="addLine()">+ Add Metronome</button>

  <label>Master Volume
    <input type="range" id="globalVol" min="0" max="100" value="100" oninput="updateGlobalVolLabel()">
    <span class="vol-label" id="globalVolLabel">100%</span>
  </label>

<label>Master BPM Scale
  <input type="range" id="globalScale" min="0.01" max="3" value="1" step="0.01" oninput="updateGlobalScaleLabel()">
  <span class="scale-label" id="globalScaleLabel">1.00x</span>
</label>

  <label>Master Hz Scale
    <input type="range" id="globalHzScale" min="0.1" max="10" value="1" step="0.1" oninput="updateGlobalHzScaleLabel()">
    <span class="scale-label" id="globalHzScaleLabel">1.0x</span>
  </label>

  <label>Master Accent Sustain
    <input type="range" id="globalAccentSus" min="0.01" max="2" value="0.5" step="0.01" oninput="updateGlobalAccentSusLabel()">
    <span class="sus-label" id="globalAccentSusLabel">0.50s</span>
  </label>

  <label>Master Beat Sustain
    <input type="range" id="globalBeatSus" min="0.01" max="2" value="0.01" step="0.01" oninput="updateGlobalBeatSusLabel()">
    <span class="sus-label" id="globalBeatSusLabel">0.01s</span>
  </label>

 <label>Master Switch Accent & Beat Sustain
  <input type="checkbox" id="masterFlip" onchange="toggleMasterFlip()">
</label>
</div>

<div class="circle" id="circle">
  <div class="center"></div>
</div>

<div class="controls" id="linesContainer"></div>

<script>
let audioCtx = null;
let lines = [];
let nextId = 0;
let animFrameId = null;

const circle = document.getElementById("circle");
const linesContainer = document.getElementById("linesContainer");
const globalBtn = document.getElementById("globalBtn");

const COLORS = [
  '#000000', '#e74c3c', '#3498db', '#2ecc71', '#f39c12',
  '#9b59b6', '#1abc9c', '#e91e63', '#795548', '#607d8b'
];

function getRadius() {
  return circle.offsetWidth / 2;
}

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function clickSound(freq, duration, volume) {
  ensureAudioCtx();
  let dur = Math.max(0.001, duration);
  let now = audioCtx.currentTime;
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.frequency.value = Math.max(1, Math.min(200000, freq));

  if (volume <= 0) {
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + dur);
  } else {
    gain.gain.value = Math.max(0, volume);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.stop(now + dur);
  }
}

function drawMarkers() {
  document.querySelectorAll(".marker").forEach(m => m.remove());
  const radius = getRadius();
  const offset = radius - (radius * 0.06);

  lines.forEach((line) => {
    if (line.isKeeper) return;
    const beatsInput = document.getElementById(`beats-${line.id}`);
    if (!beatsInput) return;

    const beats = Math.max(1, Math.min(60, parseInt(beatsInput.value) || 1));

    for (let i = 0; i < beats; i++) {
      let m = document.createElement("div");
      m.className = "marker";
      m.style.background = line.color;

      let angle = (360 / beats) * i;
      m.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-${offset}px)`;
      if (i === 0) m.style.height = "6.5%";

      circle.appendChild(m);
    }
  });
}

function drawAccents(id) {
  const container = document.getElementById(`accents-${id}`);
  if (!container) return;

  const beats = Math.max(1, Math.min(60, parseInt(document.getElementById(`beats-${id}`).value) || 1));
  let html = '';

  for (let i = 0; i < beats; i++) {
    const existing = document.getElementById(`accent-${id}-${i}`);
    const checked = existing ? existing.checked : (i === 0);
    html += `<label><input type="checkbox" id="accent-${id}-${i}" ${checked ? 'checked' : ''}>${i + 1}</label>`;
  }

  container.innerHTML = html;
}

function startKeeper() {
  const keeper = lines.find(l => l.isKeeper);
  if (keeper && !keeper.isRunning) {
    keeper.isRunning = true;
    keeper.lastTime = 0;
    ensureAnimation();
  }
}

function stopKeeper() {
  const keeper = lines.find(l => l.isKeeper);
  if (keeper) {
    keeper.isRunning = false;
    keeper.beatIndex = 0;
    keeper.lastBeatIndex = -1;
    keeper.lastTime = 0;
  }
}

function updateGlobalButton() {
  const anyVisibleRunning = lines.some(l => l.isRunning && !l.isKeeper);
  globalBtn.textContent = anyVisibleRunning ? "Stop" : "Start";
  if (!anyVisibleRunning) {
    stopKeeper();
  }
}

function updateGlobalVolLabel() {
  const val = parseFloat(document.getElementById("globalVol").value);
  document.getElementById("globalVolLabel").textContent = val + '%';
  applyGlobalVolume(val);
}

function applyGlobalVolume(newVol) {
  lines.forEach(line => {
    if (line.isKeeper) return;
    const slider = document.getElementById(`vol-${line.id}`);
    const label = document.getElementById(`volLabel-${line.id}`);
    if (slider) {
      let display = Math.max(0, Math.min(100, Math.round(line.baseVolume * newVol / 100)));
      slider.value = display;
      if (label) label.textContent = display + '%';
    }
  });
}

function onVolumeInput(id) {
  const line = lines.find(l => l.id === id);
  if (!line || line.isKeeper) return;
  const slider = document.getElementById(`vol-${id}`);
  const label = document.getElementById(`volLabel-${id}`);
  const masterVol = parseFloat(document.getElementById("globalVol").value);
  let val = parseInt(slider.value) || 0;
  val = Math.max(0, Math.min(100, val));

  if (masterVol > 0) {
    line.baseVolume = Math.max(0, Math.min(100, val / (masterVol / 100)));
  } else {
    line.baseVolume = val;
  }

  if (label) label.textContent = val + '%';
}

function updateGlobalScaleLabel() {
  const val = parseFloat(document.getElementById("globalScale").value);
  document.getElementById("globalScaleLabel").textContent = val.toFixed(2) + 'x';
  applyGlobalScale(val);
}

function applyGlobalScale(newScale) {
  lines.forEach(line => {
    if (line.isKeeper) return;
    const input = document.getElementById(`bpm-${line.id}`);
    if (input) {
      input.value = Math.max(0.01, Math.min(10000, (line.baseBpm * newScale).toFixed(2)));
    }
  });
}

function updateBaseBpm(id) {
  const line = lines.find(l => l.id === id);
  if (!line || line.isKeeper) return;
  const input = document.getElementById(`bpm-${id}`);
  const scale = parseFloat(document.getElementById("globalScale").value);
  let val = Math.max(0.01, Math.min(10000, parseFloat(input.value) || 0.01));
line.baseBpm = val / scale;
}

function updateGlobalHzScaleLabel() {
  const val = parseFloat(document.getElementById("globalHzScale").value);
  document.getElementById("globalHzScaleLabel").textContent = val.toFixed(1) + 'x';
  applyGlobalHzScale(val);
}

function applyGlobalHzScale(newScale) {
  lines.forEach(line => {
    if (line.isKeeper) return;
    const input = document.getElementById(`pitch-${line.id}`);
    if (input) {
      input.value = Math.max(1, Math.min(200000, (line.basePitch * newScale).toFixed(2)));
    }
  });
}

function updateBasePitch(id) {
  const line = lines.find(l => l.id === id);
  if (!line || line.isKeeper) return;
  const input = document.getElementById(`pitch-${id}`);
  const scale = parseFloat(document.getElementById("globalHzScale").value);
  let val = Math.max(1, Math.min(200000, parseFloat(input.value) || 1));
  line.basePitch = val / scale;
}

function updateGlobalAccentSusLabel() {
  const val = parseFloat(document.getElementById("globalAccentSus").value);
  document.getElementById("globalAccentSusLabel").textContent = val.toFixed(2) + 's';
  applyGlobalAccentSus(val);
}

function applyGlobalAccentSus(newVal) {
  let clamped = Math.max(0.01, Math.min(2.0, newVal));
  lines.forEach(line => {
    if (line.isKeeper) return;
    const slider = document.getElementById(`accentSus-${line.id}`);
    const label = document.getElementById(`accentSusLabel-${line.id}`);
    if (slider) {
      slider.value = clamped.toFixed(2);
      if (label) label.textContent = clamped.toFixed(2) + 's';
    }
  });
}

function onAccentSusInput(id) {
  const slider = document.getElementById(`accentSus-${id}`);
  const label = document.getElementById(`accentSusLabel-${id}`);
  let val = parseFloat(slider.value) || 0.01;
  val = Math.max(0.01, Math.min(2.0, val));
  if (label) label.textContent = val.toFixed(2) + 's';
}

function updateGlobalBeatSusLabel() {
  const val = parseFloat(document.getElementById("globalBeatSus").value);
  document.getElementById("globalBeatSusLabel").textContent = val.toFixed(2) + 's';
  applyGlobalBeatSus(val);
}

function applyGlobalBeatSus(newVal) {
  let clamped = Math.max(0.01, Math.min(2.0, newVal));
  lines.forEach(line => {
    if (line.isKeeper) return;
    const slider = document.getElementById(`beatSus-${line.id}`);
    const label = document.getElementById(`beatSusLabel-${line.id}`);
    if (slider) {
      slider.value = clamped.toFixed(2);
      if (label) label.textContent = clamped.toFixed(2) + 's';
    }
  });
}

function onBeatSusInput(id) {
  const slider = document.getElementById(`beatSus-${id}`);
  const label = document.getElementById(`beatSusLabel-${id}`);
  let val = parseFloat(slider.value) || 0.01;
  val = Math.max(0.01, Math.min(2.0, val));
  if (label) label.textContent = val.toFixed(2) + 's';
}

function swapSustains(id) {
  const accSlider = document.getElementById(`accentSus-${id}`);
  const beatSlider = document.getElementById(`beatSus-${id}`);
  const accLabel = document.getElementById(`accentSusLabel-${id}`);
  const beatLabel = document.getElementById(`beatSusLabel-${id}`);

  if (!accSlider || !beatSlider) return;

  const tempVal = accSlider.value;
  accSlider.value = beatSlider.value;
  beatSlider.value = tempVal;

  const tempLabel = accLabel.textContent;
  accLabel.textContent = beatLabel.textContent;
  beatLabel.textContent = tempLabel;

  const line = lines.find(l => l.id === id);
  if (line) {
    const tempBase = line.baseAccentSus;
    line.baseAccentSus = line.baseBeatSus;
    line.baseBeatSus = tempBase;
  }
}

function toggleFlip(id) {
  const line = lines.find(l => l.id === id);
  if (!line || line.isKeeper) return;
  const checkbox = document.getElementById(`flip-${id}`);
  const shouldFlip = checkbox.checked;

  if (shouldFlip !== line.isFlipped) {
    swapSustains(id);
    line.isFlipped = shouldFlip;
  }
}

function toggleMasterFlip() {
  const masterCheckbox = document.getElementById("masterFlip");
  const shouldFlip = masterCheckbox.checked;

  lines.forEach(line => {
    if (line.isKeeper) return;
    const checkbox = document.getElementById(`flip-${line.id}`);
    if (checkbox) {
      checkbox.checked = shouldFlip;
      if (shouldFlip !== line.isFlipped) {
        swapSustains(line.id);
        line.isFlipped = shouldFlip;
      }
    }
  });
}

function clampInput(inputId, minVal, maxVal) {
  const el = document.getElementById(inputId);
  if (!el) return;
  let val = parseFloat(el.value);
  if (isNaN(val) || el.value === '' || val < minVal) val = minVal;
  if (val > maxVal) val = maxVal;
  el.value = val;
}

function preventBlank(inputId, minVal) {
  const el = document.getElementById(inputId);
  if (!el) return;
  if (el.value === '' || el.value === null || el.value === undefined) {
    el.value = minVal;
  }
}

function addKeeper() {
  const keeper = {
    id: 'keeper',
    isKeeper: true,
    isRunning: false,
    beatIndex: 0,
    lastBeatIndex: -1,
    lastTime: 0,
    color: 'transparent'
  };
  lines.push(keeper);
}

function addLine() {
  const id = nextId++;
  const color = COLORS[id % COLORS.length];
  const index = lines.filter(l => !l.isKeeper).length;

  const baseBpm = 120 + (index * 10);
  const basePitch = 200 + (index * 100);
  const baseVolume = 60;
  const baseAccentSus = 0.5;
  const baseBeatSus = 0.01;

  const line = {
    id,
    isRunning: false,
    beatIndex: 0,
    lastBeatIndex: -1,
    lastTime: 0,
    color,
    baseBpm,
    basePitch,
    baseVolume,
    baseAccentSus,
    baseBeatSus,
    isFlipped: false
  };
  lines.push(line);

  const currentScale = parseFloat(document.getElementById("globalScale").value);
  const currentHzScale = parseFloat(document.getElementById("globalHzScale").value);

  const displayBpm = Math.max(1, Math.min(10000, Math.round(baseBpm * currentScale)));
  const displayPitch = Math.max(1, Math.min(200000, (basePitch * currentHzScale).toFixed(2)));

  const currentMasterVol = parseFloat(document.getElementById("globalVol").value);
  const displayVolume = Math.max(0, Math.min(100, Math.round(baseVolume * currentMasterVol / 100)));

  const displayAccentSus = parseFloat(document.getElementById("globalAccentSus").value);
  const displayBeatSus = parseFloat(document.getElementById("globalBeatSus").value);

  const hand = document.createElement("div");
  hand.className = "hand";
  hand.id = `hand-${id}`;
  hand.style.background = color;
  circle.appendChild(hand);

  const row = document.createElement("div");
  row.className = "line-row";
  row.id = `line-row-${id}`;
  row.innerHTML = `
    <span class="line-color" style="background:${color}"></span>
    <button onclick="toggleLine(${id})" id="btn-${id}">Start</button>
    <label>BPM 
  <input type="number" id="bpm-${id}" value="${displayBpm.toFixed(2)}"
    min="0.01" max="10000" step="0.01"
    oninput="preventBlank('bpm-${id}', 0.01)"
    onchange="updateBaseBpm(${id}); clampInput('bpm-${id}', 0.01, 10000)">
</label>
    <label>BPC <input type="number" id="beats-${id}" value="3" min="1" max="60" oninput="preventBlank('beats-${id}', 1)" onchange="onBpcChange(${id}); clampInput('beats-${id}', 1, 60)"></label>
    <div class="accents-wrap" id="accents-${id}"></div>
    <label>Hz <input type="number" id="pitch-${id}" value="${displayPitch}" min="1" max="200000" step="0.01" oninput="preventBlank('pitch-${id}', 1)" onchange="updateBasePitch(${id}); clampInput('pitch-${id}', 1, 200000)"></label>
    <label>Vol
      <input type="range" id="vol-${id}" min="0" max="100" value="${displayVolume}" oninput="onVolumeInput(${id})">
      <span class="vol-label" id="volLabel-${id}">${displayVolume}%</span>
    </label>
    <label>Acc
      <input type="range" id="accentSus-${id}" min="0.01" max="2" value="${displayAccentSus.toFixed(2)}" step="0.01" oninput="onAccentSusInput(${id})">
      <span class="sus-label" id="accentSusLabel-${id}">${displayAccentSus.toFixed(2)}s</span>
    </label>
    <label>Beat
      <input type="range" id="beatSus-${id}" min="0.01" max="2" value="${displayBeatSus.toFixed(2)}" step="0.01" oninput="onBeatSusInput(${id})">
      <span class="sus-label" id="beatSusLabel-${id}">${displayBeatSus.toFixed(2)}s</span>
    </label>
    <label>Flip <input type="checkbox" id="flip-${id}" onchange="toggleFlip(${id})"></label>
  `;
  linesContainer.appendChild(row);

  if (document.getElementById("masterFlip").checked) {
    const flipCheckbox = document.getElementById(`flip-${id}`);
    if (flipCheckbox) flipCheckbox.checked = true;
    swapSustains(id);
    line.isFlipped = true;
  }

  drawAccents(id);
  drawMarkers();
}

function onBpcChange(id) {
  drawAccents(id);
  drawMarkers();
}

function toggleLine(id) {
  ensureAudioCtx();

  const line = lines.find(l => l.id === id);
  if (!line || line.isKeeper) return;

  line.isRunning = !line.isRunning;
  document.getElementById(`btn-${id}`).textContent = line.isRunning ? "Stop" : "Start";

  if (line.isRunning) {
    line.lastTime = 0;
    startKeeper();
    ensureAnimation();
  }
  updateGlobalButton();
}

function toggleAll() {
  ensureAudioCtx();

  const anyVisibleRunning = lines.some(l => l.isRunning && !l.isKeeper);

  if (anyVisibleRunning) {
    lines.forEach(line => {
      if (!line.isKeeper && line.isRunning) toggleLine(line.id);
    });
  } else {
    lines.forEach(line => {
      if (!line.isKeeper && !line.isRunning) toggleLine(line.id);
    });
  }
}

function resetAll() {
  lines.forEach(line => {
    line.beatIndex = 0;
    line.lastBeatIndex = -1;
    line.lastTime = 0;
    if (!line.isKeeper) {
      const hand = document.getElementById(`hand-${line.id}`);
      if (hand) {
        hand.style.transform = `translate(-50%, -100%) rotate(0deg)`;
      }
    }
  });
}

function ensureAnimation() {
  if (!animFrameId) {
    animFrameId = requestAnimationFrame(animate);
  }
}

function animate(time) {
  let anyRunning = false;

  lines.forEach(line => {
    if (!line.isRunning) return;
    anyRunning = true;

    if (line.lastTime === 0) line.lastTime = time;
    let delta = time - line.lastTime;
    line.lastTime = time;

    let bpm, beats, pitch, volume, accentDur, beatDur, isAccent;

    if (line.isKeeper) {
      bpm = 30;
      beats = 1;
      pitch = 1;
      volume = 0.01;
      accentDur = 1;
      beatDur = 0.01;
      isAccent = true;
    } else {
      bpm = Math.max(0.01, Math.min(10000, parseFloat(document.getElementById(`bpm-${line.id}`).value) || 0.01));
      beats = Math.max(1, Math.min(60, parseInt(document.getElementById(`beats-${line.id}`).value) || 1));
      pitch = Math.max(1, Math.min(200000, parseFloat(document.getElementById(`pitch-${line.id}`).value) || 200));
      volume = (parseFloat(document.getElementById(`vol-${line.id}`).value) || 0) / 100;
      accentDur = parseFloat(document.getElementById(`accentSus-${line.id}`).value) || 0.01;
      beatDur = parseFloat(document.getElementById(`beatSus-${line.id}`).value) || 0.01;
    }

    line.beatIndex += delta * bpm / 60000;

    if (!line.isKeeper) {
      let rotation = (line.beatIndex * 360 / beats) % 360;
      const hand = document.getElementById(`hand-${line.id}`);
      if (hand) {
        hand.style.transform = `translate(-50%, -100%) rotate(${rotation}deg)`;
      }
    }

    let currentBeat = Math.floor(line.beatIndex);

    while (line.lastBeatIndex < currentBeat) {
      line.lastBeatIndex++;

      let beatInMeasure = line.lastBeatIndex % beats;

      if (!line.isKeeper) {
        const accentCheckbox = document.getElementById(`accent-${line.id}-${beatInMeasure}`);
        isAccent = accentCheckbox ? accentCheckbox.checked : false;
      }

      let dur = isAccent ? accentDur : beatDur;
      clickSound(pitch, dur, volume);
    }
  });

  if (anyRunning) {
    animFrameId = requestAnimationFrame(animate);
  } else {
    animFrameId = null;
  }
}

window.addEventListener("resize", drawMarkers);

addKeeper();
addLine();
</script>
